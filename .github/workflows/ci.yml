name: CI Pipeline

on:
  pull_request:
    branches: [ main, master ]

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linting
        run: pnpm lint

      - name: Check Formatting
        run: pnpm format:check

      - name: Run Typecheck
        run: pnpm typecheck

      - name: Run Tests
        run: pnpm test

      - name: Verify API Generation
          run: |
            pnpm generate:api
            
            if [ -n "$(git status --porcelain)" ]; then
              echo "::error::API generated code is out of sync with deps/api-specs. Please run 'pnpm generate:api' and commit the changes."
              git status
              exit 1
            fi
