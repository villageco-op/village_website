name: CI Pipeline

on:
  pull_request:
    branches: [ main, master, staging ]

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linting
        run: pnpm lint

      - name: Check Formatting
        run: pnpm format:check

      - name: Run Typecheck
        run: pnpm typecheck

      - name: Run Tests
        run: pnpm test:unit

      - name: Verify API Sync
        run: |
          SPEC_PATH="deps/api-specs/openapi.json"
          GENERATED_PATH="src/lib/api/generated"

          git fetch origin ${{ github.base_ref }}

          SPEC_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "$SPEC_PATH" || true)

          if [ -n "$SPEC_CHANGED" ]; then
            echo "✅ API Specification change detected."
            
            CODE_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "$GENERATED_PATH" || true)
            
            if [ -z "$CODE_CHANGED" ]; then
              echo "::error::The API spec ($SPEC_PATH) was updated, but the generated code ($GENERATED_PATH) was not. Please run 'pnpm generate:api' locally and commit the changes."
              exit 1
            else
              echo "✅ Generated code appears to be updated in tandem."
            fi
          else
            echo "No API spec changes detected. Skipping sync check."
          fi
  
  build-storybook:
      name: Storybook Build & Test
      runs-on: ubuntu-latest
      container:
        image: mcr.microsoft.com/playwright:v1.59.1-noble
      env:
        NEXT_PUBLIC_API_URL: http://localhost:3000
      steps:
        - uses: actions/checkout@v4
        - uses: pnpm/action-setup@v3
          with: { version: 10 }
        - uses: actions/setup-node@v4
          with: { node-version: '22', cache: 'pnpm' }
          
        - name: Install dependencies
          run: pnpm install --frozen-lockfile

        - name: Build Storybook
          run: pnpm build-storybook

        - name: Run Interaction Tests
          run: pnpm test:storybook
